# ┌──────────────────────────────────────────────────────────────────┐
# │  Save this as:  .github/workflows/arcade.yml                       │
# │  in your  Jovo-Jovi/Jovo-Jovi  repo.                               │
# │  It regenerates the Pac-Man contribution SVG every day and pushes  │
# │  it to a branch called `output`, which the README embeds.          │
# └──────────────────────────────────────────────────────────────────┘

name: generate arcade contribution graph

on:
  schedule:
    - cron: "0 0 * * *"      # every day at 00:00 UTC
  workflow_dispatch:          # lets you run it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate arcade SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # ── Want a SECOND game (Breakout) too? Uncomment the next line.
          # After the first run, open the `output` branch to see the exact
          # SVG filename it produced, then embed that file in your README.
          # games: 'pacman,breakout'

      - name: push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
